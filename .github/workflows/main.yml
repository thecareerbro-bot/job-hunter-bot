name: Job Hunter Bot

on:
  schedule:
    - cron: '0 4,6,8,10,12,14 * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Get the Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        pip install requests beautifulsoup4 urllib3

    - name: Start the Bot
      run: python main.py

    - name: Save Memory
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add bot_memory.txt
        git commit -m "Saved new job links to memory" || echo "No new links to save"
        git push
